name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip
        run: |
          mkdir -p dist
          zip -r "dist/tylo_sauna.zip" "custom_components/tylo_sauna"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tylo_sauna.zip
          generate_release_notes: true


