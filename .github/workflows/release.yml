name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip
        run: |
          mkdir -p dist
          # IMPORTANT: zip must contain files at ROOT (no folder wrapper)
          # HACS extracts zip INTO custom_components/tylo_sauna/
          cd custom_components/tylo_sauna
          zip -r "../../dist/tylo_sauna.zip" . -x "*.pyc" -x "__pycache__/*"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tylo_sauna.zip
          generate_release_notes: true


