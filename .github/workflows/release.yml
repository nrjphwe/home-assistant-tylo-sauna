name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip
        run: |
          mkdir -p dist
          # IMPORTANT: zip must contain files at ROOT (no folder wrapper)
          # HACS extracts zip INTO custom_components/tylo_sauna/
          cd custom_components/tylo_sauna
          zip -r "../../dist/tylo_sauna.zip" . -x "*.pyc" -x "__pycache__/*"

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          # Extract section for current version from CHANGELOG.md
          # Finds content between ## [vX.Y.Z] and next ## [
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \\[$VERSION\\]/{flag=1; next} /^## \\[/{flag=0} flag" CHANGELOG.md)
          # Handle multi-line output for GitHub Actions
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tylo_sauna.zip
          body: ${{ steps.changelog.outputs.notes }}


